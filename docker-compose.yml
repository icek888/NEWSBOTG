version: '3.8'

services:
  app:
    build: .
    container_name: newsautotg
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Монтируем сессию telegram и изображения
      - ./bot_session.session:/app/bot_session.session
      - ./images:/app/images
    env_file:
      - .env
    environment:
      # PostgreSQL для продакшена
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-newsuser}:${POSTGRES_PASSWORD:-newspass}@db:5432/${POSTGRES_DB:-newsdb}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: newsautotg_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-newsuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-newspass}
      - POSTGRES_DB=${POSTGRES_DB:-newsdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
