version: '3.8'

services:
  app:
    # Образ из Docker Hub (публичный)
    image: docker.io/icewind777/newsbotg:latest
    container_name: newsbotg
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Монтируем сессию telegram и изображения
      - ./bot_session.session:/app/bot_session.session
      - ./images:/app/images
      - ./app/main.py:/app/app/main.py
    env_file:
      - .env
    environment:
      # PostgreSQL для продакшена
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-newsuser}:${POSTGRES_PASSWORD:-newspass}@db:5432/${POSTGRES_DB:-newsdb}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: newsbotg_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-newsuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-newspass}
      - POSTGRES_DB=${POSTGRES_DB:-newsdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
