[alembic]
# path to migration scripts
script_location = alembic
sqlalchemy.url = sqlite:///ai_news.db

# template used to generate migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, used by alembic.util.context.pathed
# paths = %(here)s/%(optionpaths)s

# version to upgrade to, used by 'alembic upgrade <version>'
# version_path = alembic/versions

# version to downgrade to, used by 'alembic downgrade <version>'
# downgrade_option =

# set to 'true' to run the environment during
# 'alembic revision'
# to autogenerate from modules
# autogenerate = false

# set to 'true' to not emit Alembic's VERSION_LOG messages
# during operations, only the SQLAlchemy log will be visible
# quiet = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = logging.StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
